<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- SAP-style blue parallelogram, gradient -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4bb4f0"/>
      <stop offset="100%" stop-color="#1a6fbf"/>
    </linearGradient>
  </defs>

  <!-- Parallelogram: fills the whole canvas -->
  <polygon points="0,0 200,0 160,100 0,100" fill="url(#g)"/>

  <!-- SAP wordmark, centered, dominates the shape -->
  <text x="80" y="72"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="72"
        font-weight="900"
        fill="#ffffff"
        letter-spacing="-2">SAP</text>
</svg>
